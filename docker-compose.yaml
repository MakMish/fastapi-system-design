services:
  web:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8000:8000"
    volumes:
      - user_data:/var/lib/web/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:12345@db:5432/impexp
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      celery:
        condition:  service_started

  redis:
    image: "redis"
    ports:
      - 6379:6379
  
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:12345@db:5432/impexp
      - REDIS_URL=redis://redis:6379/0  
    depends_on:
      redis:
        condition: service_started
    command: celery -A tasks.celery_app worker --pool=solo --loglevel=info

  db:
    image: "postgres:15"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=impexp
      - POSTGRES_PASSWORD=12345
    volumes:
      - postgres_data:/var/lib/postgresql/data 

    restart: always

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
 
volumes:
  postgres_data:
  user_data: